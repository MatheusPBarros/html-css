<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vídeos com HTML</title>
</head>
<body>
        <h1>Inserindo vídeos hospedados localmente</h1>
        <p>Este video está hospedado no meu proprio servidor</p>
        <video width="250" controls autoplay loop>
            <source src="midia/meu-video.mp4.mp4" type="video/mp4">
            <source src="midia/Meu-Video.MKV.mkv" type="video/mkv">
            <source src="midia/Meu-Video.web.webm" type="video/webm">
            <p>Seu navegador não é compativel com reprodução de video</p>   
       </video>
       <h1>Colocando videos do Youtube<h1>
        |<iframe width="250" height="315" src="https://www.youtube.com/embed/FdE5G95B7Mg" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
    
</body>
</html>
