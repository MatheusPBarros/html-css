<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de Caixas</title>
    <style>
        h1{
            background-color: darkgrey;
            height: 300px;
            width: 300px;
            border:10px solid rgba(95, 160, 95, 0.767);
            
            padding: 10px;
           
            margin: 20px auto 40px rgb(12, 15, 196);

            outline: 5px dashed rgb(16, 58, 38);
        }

        a{
            border: 5px solid purple;

            padding: 10px;

         }
    </style>
</head>
<body>
    <h1>Exemplo de Caixa box-level</h1>
    <p>Paragrafos também são exemplos de box level, mas os <a href="#">links são exemplos de caixa in-line</a> . Vamos ver como tudo funciona</p>
    
</body>
</html>
