<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midias em HTML</title>
</head>
<body>
    <h1>Imagem Dinamica</h1>
    <p>Tente abrir esse site em varios dispositivos diferentes ou simplesmente aumente o diminua o tamanho do seu navegador</p>
  <picture>
    <source media="(max-width: 750px)" srcset="imagens/foto-p.png" type="image/png">
    <source media="(max-width: 1000px)" srcset="imagens/foto-m.png" type="image/png">
    <img src="imagens/foto-g.png" alt="foto flexivel">
  </picture>
  <!--Obs: nunca esquecer de modificar a media="" para MAX(maximo) por padrao vem com MIN(minimo)-->
  <h1>Reproduzindo audio</h1>
  <p>Vamos aprender a reproduzir audio em HTML</p>
  <audio src="midia/music-mp3.mp3" controls autoplay ></audio>

    
</body>
</html>
