<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>
        /*
        # = id
        . = class
        : = pseudo-class
        :: = pseudo-element
        > = clildren (filho) 
        */
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        a{
            color: red;
            text-decoration: none;
            font-weight: bold;
        }
        a:visited{/*a função faz com que o link mude a cor apos visitar o site*/
            color: darkred;
        }
        a:hover{ /*marca o testo ao passar o mouse por cima*/
            color: black;
            text-decoration: underline;/*coloca uma linha por baixo do texto ao passar o mouse*/
        }
        a:active{
            color: yellow;/* a função active muda a cor do texto ao clicar */
        }

        .especial{
            background-color: rgba(97, 70, 70, 0.726);
        }

        .especial::before{
            content: '>' ;
        }

        .especial::after{
            content:'<';
        }
    </style>
</head>
<body>
    <h1>Personalisando Links</h1>
    <ul>
        <li><a href="https://github.com/explore" target="_blank" rel="externo">Repositorio GitHurb</a></li>
        <li><a href="https://www.youtube.com/" target="_blank" rel="externo" class="especial">Canal do YouTube</a></li>
        <li><a href="https://www.cursoemvideo.com/" target="_blank" rel="externo" class="especial">Site do CursoemVideo</a></li>
    </ul>
    
</body>
</html>
